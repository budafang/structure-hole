    const strokeCollator = new Intl.Collator("zh-Hant-u-co-stroke");

    function parseRoster(text) {
      const rawRoster = text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      const duplicateCount = rawRoster.reduce((acc, name) => {
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      const seenDuplicate = {};

      return [...rawRoster]
        .sort((a, b) => strokeCollator.compare(a, b))
        .map((name, index) => {
          if (duplicateCount[name] > 1) {
            seenDuplicate[name] = (seenDuplicate[name] || 0) + 1;
          }
          const suffix = duplicateCount[name] > 1 ? `（${String.fromCharCode(64 + seenDuplicate[name])}）` : "";
          return {
            id: index + 1,
            name,
            label: `${name}${suffix}`,
          };
        });
    }

    function dedupeEdges(submissions, labelToId) {
      const map = new Map();

      Object.entries(submissions).forEach(([sourceLabel, links]) => {
        const sourceId = labelToId[sourceLabel];
        if (!sourceId) return;

        (links.strong || []).forEach((targetLabel) => {
          const targetId = labelToId[targetLabel];
          if (!targetId || targetId === sourceId) return;
          const key = [Math.min(sourceId, targetId), Math.max(sourceId, targetId), "strong"].join("-");
          map.set(key, { source: sourceId, target: targetId, type: "strong" });
        });

        (links.weak || []).forEach((targetLabel) => {
          const targetId = labelToId[targetLabel];
          if (!targetId || targetId === sourceId) return;
          const key = [Math.min(sourceId, targetId), Math.max(sourceId, targetId), "weak"].join("-");
          map.set(key, { source: sourceId, target: targetId, type: "weak" });
        });
      });

      return Array.from(map.values());
    }

    function buildAdjacency(students, edges, mode) {
      const adjacency = {};
      students.forEach((s) => {
        adjacency[s.id] = [];
      });

      edges.forEach((edge) => {
        if (mode === "strongOnly" && edge.type === "weak") return;
        const weight = edge.type === "strong" ? 1 : mode === "weakPriority" ? 1 : 2;
        adjacency[edge.source].push({ id: edge.target, type: edge.type, weight });
        adjacency[edge.target].push({ id: edge.source, type: edge.type, weight });
      });

      return adjacency;
    }

    function bfs(startId, adjacency) {
      if (!startId || !adjacency[startId]) {
        return { order: [], distance: {}, parent: {} };
      }

      const visited = new Set([startId]);
      const distance = { [startId]: 0 };
      const parent = {};
      const order = [startId];
      const queue = [startId];

      while (queue.length) {
        const current = queue.shift();
        const neighbors = [...adjacency[current]].sort((a, b) => a.weight - b.weight);

        neighbors.forEach((next) => {
          if (!visited.has(next.id)) {
            visited.add(next.id);
            distance[next.id] = distance[current] + 1;
            parent[next.id] = current;
            order.push(next.id);
            queue.push(next.id);
          }
        });
      }

      return { order, distance, parent };
    }

    function computeDegreeMetrics(students, edges) {
      const degree = {};
      const normalized = {};
      students.forEach((s) => { degree[s.id] = 0; });

      edges.forEach((edge) => {
        degree[edge.source] += 1;
        degree[edge.target] += 1;
      });

      const n = students.length;
      students.forEach((s) => {
        normalized[s.id] = n > 1 ? degree[s.id] / (n - 1) : 0;
      });

      return { degree, normalized };
    }

    function computeBetweennessCentrality(students, edges) {
      const ids = students.map((s) => s.id);
      const neighbors = {};
      ids.forEach((id) => { neighbors[id] = []; });

      edges.forEach((edge) => {
        neighbors[edge.source].push(edge.target);
        neighbors[edge.target].push(edge.source);
      });

      const CB = {};
      ids.forEach((id) => { CB[id] = 0; });

      ids.forEach((s) => {
        const S = [];
        const P = {};
        const sigma = {};
        const dist = {};

        ids.forEach((v) => {
          P[v] = [];
          sigma[v] = 0;
          dist[v] = -1;
        });

        sigma[s] = 1;
        dist[s] = 0;
        const Q = [s];

        while (Q.length) {
          const v = Q.shift();
          S.push(v);

          neighbors[v].forEach((w) => {
            if (dist[w] < 0) {
              Q.push(w);
              dist[w] = dist[v] + 1;
            }
            if (dist[w] === dist[v] + 1) {
              sigma[w] += sigma[v];
              P[w].push(v);
            }
          });
        }

        const delta = {};
        ids.forEach((v) => { delta[v] = 0; });

        while (S.length) {
          const w = S.pop();
          P[w].forEach((v) => {
            if (sigma[w] !== 0) {
              delta[v] += (sigma[v] / sigma[w]) * (1 + delta[w]);
            }
          });
          if (w !== s) {
            CB[w] += delta[w];
          }
        }
      });

      ids.forEach((id) => {
        CB[id] = CB[id] / 2;
      });

      const normalized = {};
      const n = ids.length;
      const denom = n > 2 ? ((n - 1) * (n - 2)) / 2 : 1;
      ids.forEach((id) => {
        normalized[id] = denom > 0 ? CB[id] / denom : 0;
      });

      return { raw: CB, normalized };
    }

    function getNodeMargin(degree = 0) {
      if (degree >= 6) return { x: 9, y: 7 };
      if (degree >= 3) return { x: 8, y: 6.5 };
      return { x: 7, y: 6 };
    }

    function clampNodePosition(x, y, degree = 0) {
      const margin = getNodeMargin(degree);
      return {
        x: Math.max(margin.x, Math.min(100 - margin.x, x)),
        y: Math.max(margin.y, Math.min(100 - margin.y, y)),
      };
    }

    function buildPositions(students, edges, degreeCounts) {
      if (!students.length) return {};

      if (!edges.length) {
        const positions = {};
        const count = students.length;

        const cols = Math.ceil(Math.sqrt(count * 1.6));
        const rows = Math.ceil(count / cols);

        const left = 10;
        const right = 90;
        const top = 12;
        const bottom = 88;

        const xGap = cols > 1 ? (right - left) / (cols - 1) : 0;
        const yGap = rows > 1 ? (bottom - top) / (rows - 1) : 0;

        students.forEach((student, index) => {
          const row = Math.floor(index / cols);
          const col = index % cols;

          const offset = row % 2 === 0 ? 0 : xGap * 0.35;
          const jitterX = ((index * 17) % 7 - 3) * 0.35;
          const jitterY = ((index * 13) % 5 - 2) * 0.35;

          const rawX = left + col * xGap + offset + jitterX;
          const rawY = top + row * yGap + jitterY;
          const degree = degreeCounts[student.id] || 0;

          positions[student.id] = clampNodePosition(rawX, rawY, degree);
        });

        return positions;
      }

      const adjacency = {};
      students.forEach((s) => { adjacency[s.id] = new Set(); });

      edges.forEach((edge) => {
        adjacency[edge.source]?.add(edge.target);
        adjacency[edge.target]?.add(edge.source);
      });

      const visited = new Set();
      const components = [];

      for (const s of students) {
        if (visited.has(s.id)) continue;
        const queue = [s.id];
        visited.add(s.id);
        const comp = [];

        while (queue.length) {
          const cur = queue.shift();
          comp.push(cur);
          for (const nb of adjacency[cur]) {
            if (!visited.has(nb)) {
              visited.add(nb);
              queue.push(nb);
            }
          }
        }

        components.push(comp);
      }

      const total = components.length;
      const centers = components.map((comp, idx) => {
        const angle = (Math.PI * 2 * idx) / Math.max(total, 1) - Math.PI / 2;
        const radius = total === 1 ? 0 : 24;
        return {
          x: 50 + Math.cos(angle) * radius,
          y: 50 + Math.sin(angle) * radius,
        };
      });

      const positions = {};

      components.forEach((comp, compIndex) => {
        const center = centers[compIndex];
        const sorted = [...comp].sort((a, b) => (degreeCounts[b] || 0) - (degreeCounts[a] || 0));
        const localMax = Math.max(...sorted.map((id) => degreeCounts[id] || 0), 1);

        sorted.forEach((id, localIndex) => {
          const score = degreeCounts[id] || 0;
          const normalized = score / localMax;
          const ring = localIndex === 0 ? 0 : 8 + Math.floor(localIndex / 6) * 7 + (1 - normalized) * 4;
          const angle = localIndex === 0 ? 0 : (Math.PI * 2 * (localIndex - 1)) / Math.max(sorted.length - 1, 1);

          const rawX = center.x + Math.cos(angle) * ring;
          const rawY = center.y + Math.sin(angle) * ring;

          positions[id] = clampNodePosition(rawX, rawY, score);
        });
      });

      return positions;
    }

    async function deleteAllResponses() {
      const snapshot = await db
        .collection("classes")
        .doc(CLASS_ID)
        .collection("responses")
        .get();

      if (snapshot.empty) return;

      const batch = db.batch();
      snapshot.forEach((doc) => batch.delete(doc.ref));
      await batch.commit();

    function getPropagationStats(startId, adjacency, totalStudents) {
      if (!startId || !adjacency[startId]) {
        return {
          layers: [],
          cumulative: [],
          reachableCount: 0,
          unreachableCount: totalStudents,
          avgDistance: null,
          maxDistance: null,
          roundsTo50: null,
          roundsTo80: null,
          distanceMap: {}
        };
      }

      const visited = new Set([startId]);
      const distanceMap = { [startId]: 0 };
      const layers = [[startId]];
      const queue = [startId];

      while (queue.length) {
        const current = queue.shift();
        const currentDistance = distanceMap[current];
        const neighbors = [...adjacency[current]].sort((a, b) => a.weight - b.weight);

        neighbors.forEach((next) => {
          if (!visited.has(next.id)) {
            visited.add(next.id);
            distanceMap[next.id] = currentDistance + 1;

            if (!layers[currentDistance + 1]) {
              layers[currentDistance + 1] = [];
            }
            layers[currentDistance + 1].push(next.id);
            queue.push(next.id);
          }
        });
      }

      const cumulative = [];
      let sum = 0;
      layers.forEach((layer) => {
        sum += layer.length;
        cumulative.push(sum);
      });

      const reachableCount = visited.size;
      const unreachableCount = Math.max(totalStudents - reachableCount, 0);

      const distanceValues = Object.values(distanceMap).filter((d) => d > 0);
      const avgDistance = distanceValues.length
        ? distanceValues.reduce((a, b) => a + b, 0) / distanceValues.length
        : 0;
      const maxDistance = distanceValues.length ? Math.max(...distanceValues) : 0;

      const threshold50 = Math.ceil(totalStudents * 0.5);
      const threshold80 = Math.ceil(totalStudents * 0.8);

      let roundsTo50 = null;
      let roundsTo80 = null;

      cumulative.forEach((count, index) => {
        if (roundsTo50 === null && count >= threshold50) roundsTo50 = index;
        if (roundsTo80 === null && count >= threshold80) roundsTo80 = index;
      });

      return {
        layers,
        cumulative,
        reachableCount,
        unreachableCount,
        avgDistance,
        maxDistance,
        roundsTo50,
        roundsTo80,
        distanceMap
      };
    }

    function fmt(num, digits = 3) {
      if (num === null || num === undefined || Number.isNaN(num)) return "—";
      return Number(num || 0).toFixed(digits);
    }

    function NetworkGraph({
      students,
      positions,
      edges,
      activeIds,
      selectedId,
      onSelect,
      startId,
      betweennessRaw,
      degreeRaw,
      onMoveNode
    }) {
      const containerRef = useRef(null);
      const draggingRef = useRef(null);

      function updateNodePosition(clientX, clientY) {
        const dragging = draggingRef.current;
        const container = containerRef.current;
        if (!dragging || !container) return;

        const rect = container.getBoundingClientRect();
        const rawX = ((clientX - rect.left) / rect.width) * 100;
        const rawY = ((clientY - rect.top) / rect.height) * 100;
        const degree = degreeRaw[dragging.id] || 0;
        const clamped = clampNodePosition(rawX, rawY, degree);

        onMoveNode(dragging.id, clamped);
      }

      function handlePointerMove(e) {
        if (!draggingRef.current) return;
        e.preventDefault();
        updateNodePosition(e.clientX, e.clientY);
      }

      function stopDragging() {
        draggingRef.current = null;
        window.removeEventListener("pointermove", handlePointerMove);
        window.removeEventListener("pointerup", stopDragging);
      }

      function startDragging(e, id) {
        e.preventDefault();
        e.stopPropagation();
        draggingRef.current = { id };
        onSelect(id);
        window.addEventListener("pointermove", handlePointerMove);
        window.addEventListener("pointerup", stopDragging);
      }

      useEffect(() => {
        return () => {
          window.removeEventListener("pointermove", handlePointerMove);
          window.removeEventListener("pointerup", stopDragging);
        };
      }, []);

      return (
        <div
          ref={containerRef}
          className="relative h-[720px] w-full overflow-hidden rounded-[28px] border border-slate-200 bg-white"
        >
          <svg className="absolute inset-0 h-full w-full">
            {edges.map((edge, idx) => {
              const p1 = positions[edge.source] || { x: 50, y: 50 };
              const p2 = positions[edge.target] || { x: 50, y: 50 };
              const active = activeIds.has(edge.source) && activeIds.has(edge.target);

              return (
                <line
                  key={idx}
                  x1={`${p1.x}%`}
                  y1={`${p1.y}%`}
                  x2={`${p2.x}%`}
                  y2={`${p2.y}%`}
                  stroke="currentColor"
                  className={
                    edge.type === "strong"
                      ? (active ? "text-slate-400" : "text-slate-200")
                      : (active ? "text-emerald-400" : "text-emerald-200")
                  }
                  strokeWidth={edge.type === "strong" ? 2.2 : 2.4}
                  strokeDasharray={edge.type === "weak" ? "6 5" : "0"}
                />
              );
            })}
          </svg>

          {students.map((student) => {
            const p = positions[student.id] || { x: 50, y: 50 };
            const selected = selectedId === student.id;
            const active = activeIds.has(student.id);
            const isStart = startId === student.id;
            const isBridge = (betweennessRaw[student.id] || 0) > 0;
            const degree = degreeRaw[student.id] || 0;
            const sizeClass = degree >= 6 ? "min-w-[92px]" : degree >= 3 ? "min-w-[80px]" : "min-w-[72px]";

            return (
              <button
                key={student.id}
                onClick={() => onSelect(student.id)}
                onPointerDown={(e) => startDragging(e, student.id)}
                className={`absolute -translate-x-1/2 -translate-y-1/2 rounded-full border px-3 py-2 text-[11px] font-medium shadow-sm transition ${sizeClass} ${selected ? "border-slate-900 bg-slate-900 text-white" : active ? "border-emerald-500 bg-emerald-50 text-slate-900" : "border-slate-200 bg-white text-slate-700"}`}
                style={{
                  left: `${p.x}%`,
                  top: `${p.y}%`,
                  cursor: "grab",
                  userSelect: "none",
                  touchAction: "none"
                }}
                title="可拖曳移動節點"
              >
                <div className="truncate">{student.label}</div>
                <div className="mt-1 text-[10px] opacity-80">
                  {isStart ? "起點" : isBridge ? "橋樑位" : ""}
                </div>
              </button>
            );
          })}

          <div className="absolute bottom-4 left-4 rounded-2xl bg-white/95 px-4 py-3 shadow-sm ring-1 ring-slate-200">
            <div className="text-xs text-slate-500">圖例</div>
            <div className="mt-2 flex flex-wrap gap-3 text-xs text-slate-700">
              <span>— 強連結</span>
              <span className="text-emerald-600">- - 弱連結</span>
              <span>綠色節點＝目前輪次已收到訊息</span>
              <span>節點越大＝度中心性越高</span>
              <span>可直接拖曳節點調整位置</span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [rosterText, setRosterText] = useState(defaultRosterText);
      const [students, setStudents] = useState(() => parseRoster(defaultRosterText));
      const [selectedStudentId, setSelectedStudentId] = useState("1");
      const [strongSelections, setStrongSelections] = useState([]);
      const [weakSelections, setWeakSelections] = useState([]);
      const [submissions, setSubmissions] = useState({});
      const [viewStudentId, setViewStudentId] = useState(1);
      const [startId, setStartId] = useState(1);
      const [mode, setMode] = useState("all");
      const [roundStep, setRoundStep] = useState(999);
      const [submitMessage, setSubmitMessage] = useState("");
      const [manualPositions, setManualPositions] = useState({});
      const [isBusy, setIsBusy] = useState(false);

      useEffect(() => {
        const unsub = db.collection("classes").doc(CLASS_ID).onSnapshot((doc) => {
          const data = doc.data();
          if (!data) return;

          if (data.rosterText) {
            setRosterText(data.rosterText);
            const parsed = parseRoster(data.rosterText);
            setStudents(parsed);

            if (parsed.length) {
              setSelectedStudentId((prev) => prev || String(parsed[0].id));
              setViewStudentId((prev) => prev || parsed[0].id);
              setStartId((prev) => prev || parsed[0].id);
            }
          }
        });

        return () => unsub();
      }, []);

      useEffect(() => {
        const unsub = db
          .collection("classes")
          .doc(CLASS_ID)
          .collection("responses")
          .onSnapshot((snapshot) => {
            const next = {};
            snapshot.forEach((doc) => {
              const data = doc.data();
              if (!data || !data.studentId) return;
              next[data.studentId] = {
                strong: data.strong || [],
                weak: data.weak || []
              };
            });
            setSubmissions(next);
          });

        return () => unsub();
      }, []);

      const labelToId = useMemo(() => {
        const map = {};
        students.forEach((s) => { map[s.label] = s.id; });
        return map;
      }, [students]);

      const edges = useMemo(() => dedupeEdges(submissions, labelToId), [submissions, labelToId]);
      const degreeMetrics = useMemo(() => computeDegreeMetrics(students, edges), [students, edges]);
      const betweennessMetrics = useMemo(() => computeBetweennessCentrality(students, edges), [students, edges]);
      const autoPositions = useMemo(() => buildPositions(students, edges, degreeMetrics.degree), [students, edges, degreeMetrics.degree]);

      const positions = useMemo(() => {
        const merged = { ...autoPositions };
        Object.entries(manualPositions).forEach(([id, pos]) => {
          merged[id] = pos;
        });
        return merged;
      }, [autoPositions, manualPositions]);

      const adjacency = useMemo(() => buildAdjacency(students, edges, mode), [students, edges, mode]);
      const propagationStats = useMemo(
        () => getPropagationStats(startId, adjacency, students.length),
        [startId, adjacency, students.length]
      );

      const currentVisibleRound = roundStep >= 999
        ? Math.max(propagationStats.layers.length - 1, 0)
        : Math.min(roundStep, Math.max(propagationStats.layers.length - 1, 0));

      const activeIds = useMemo(() => {
        const ids = new Set();
        if (!propagationStats.layers.length) return ids;

        const limit = roundStep >= 999 ? propagationStats.layers.length - 1 : roundStep;

        for (let i = 0; i <= limit; i++) {
          const layer = propagationStats.layers[i] || [];
          layer.forEach((id) => ids.add(id));
        }
        return ids;
      }, [propagationStats.layers, roundStep]);

      const selectedStudent = students.find((s) => s.id === viewStudentId) || students[0] || { id: 1, label: "", name: "" };
      const completionCount = Object.keys(submissions).length;
      const completionRate = students.length ? Math.round((completionCount / students.length) * 100) : 0;

      const topDegree = [...students]
        .filter((student) => (degreeMetrics.degree[student.id] || 0) > 0)
        .sort((a, b) => (degreeMetrics.degree[b.id] || 0) - (degreeMetrics.degree[a.id] || 0))
        .slice(0, 5);

      const topBetweenness = [...students]
        .filter((student) => (betweennessMetrics.raw[student.id] || 0) > 0)
        .sort((a, b) => (betweennessMetrics.raw[b.id] || 0) - (betweennessMetrics.raw[a.id] || 0))
        .slice(0, 5);

      const roundSummaries = useMemo(() => {
        const summaries = [];
        for (let i = 0; i < Math.min(propagationStats.layers.length, 4); i++) {
          summaries.push({
            round: i,
            layerCount: propagationStats.layers[i]?.length || 0,
            cumulativeCount: propagationStats.cumulative[i] || 0
          });
        }
        return summaries;
      }, [propagationStats]);

      const currentLayer = propagationStats.layers[currentVisibleRound] || [];
      const shownOrderLabels = Array.from(activeIds)
        .map((id) => students.find((s) => s.id === id)?.label)
        .filter(Boolean);

      async function rebuildClass() {
        const parsed = parseRoster(rosterText);
        if (!parsed.length) {
          alert("請先貼上至少一位學生姓名");
          return;
        }

        const ok = confirm("重建班級名單後，會清空目前所有已送出的連結資料。要繼續嗎？");
        if (!ok) return;

        try {
          setIsBusy(true);

          await db.collection("classes").doc(CLASS_ID).set({
            rosterText,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });

          await deleteAllResponses();

          setStudents(parsed);
          setSubmissions({});
          setManualPositions({});
          setSelectedStudentId(String(parsed[0].id));
          setViewStudentId(parsed[0].id);
          setStartId(parsed[0].id);
          setStrongSelections([]);
          setWeakSelections([]);
          setRoundStep(999);
          setSubmitMessage("已重建名單並清空所有連結資料");
          setTimeout(() => setSubmitMessage(""), 2500);
        } catch (error) {
          console.error(error);
          alert("重建失敗，請稍後再試");
        } finally {
          setIsBusy(false);
        }
      }

      async function clearAllNetworkData() {
        const ok = confirm("這會清空所有學生已送出的強連結與弱連結資料，而且重新整理後也不會再出現。要繼續嗎？");
        if (!ok) return;

        try {
          setIsBusy(true);
          await deleteAllResponses();
          setSubmissions({});
          setManualPositions({});
          setStrongSelections([]);
          setWeakSelections([]);
          setRoundStep(999);
          setSubmitMessage("已清空全部連結資料");
          setTimeout(() => setSubmitMessage(""), 2500);
        } catch (error) {
          console.error(error);
          alert("清空失敗，請稍後再試");
        } finally {
          setIsBusy(false);
        }
      }

      function toggleStrong(id) {
        setStrongSelections((prev) => {
          if (prev.includes(id)) return prev.filter((item) => item !== id);
          if (prev.length >= 3) return [...prev.slice(1), id];
          return [...prev, id];
        });
      }

      function toggleWeak(id) {
        setWeakSelections((prev) => {
          if (prev.includes(id)) return prev.filter((item) => item !== id);
          if (prev.length >= 2) return [...prev.slice(1), id];
          return [...prev, id];
        });
      }

      async function submitOwnNetwork() {
        const sourceId = Number(selectedStudentId);
        const student = students.find((s) => s.id === sourceId);
        if (!student) return;

        const payload = {
          studentId: student.label,
          strong: strongSelections
            .map(Number)
            .map((id) => students.find((s) => s.id === id)?.label)
            .filter(Boolean),
          weak: weakSelections
            .map(Number)
            .map((id) => students.find((s) => s.id === id)?.label)
            .filter(Boolean),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db
          .collection("classes")
          .doc(CLASS_ID)
          .collection("responses")
          .doc(student.label)
          .set(payload, { merge: true });

        setViewStudentId(sourceId);
        setSubmitMessage(`已送出：${student.label}`);
        setTimeout(() => setSubmitMessage(""), 2000);
      }

      function resetPropagation() {
        setRoundStep(999);
      }

      function playPropagation() {
        setRoundStep(0);
      }

      function advancePropagation() {
        setRoundStep((prev) => {
          const maxRound = Math.max(propagationStats.layers.length - 1, 0);
          if (prev >= maxRound) return prev;
          if (prev === 999) return 0;
          return prev + 1;
        });
      }

      function handleMoveNode(id, pos) {
        setManualPositions((prev) => ({
          ...prev,
          [id]: pos
        }));
      }

      function resetLayout() {
        setManualPositions({});
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900">
          <div className="mx-auto max-w-[1650px] px-6 py-8 lg:px-10">
            <div className="grid gap-6 xl:grid-cols-[1.78fr_0.68fr]">
              <Card>
                <div className="p-6">
                  <div className="flex flex-wrap items-center justify-between gap-3">
                    <div className="text-2xl font-semibold text-slate-900">班級網絡圖</div>
                    <div className="flex flex-wrap gap-2">
                      <Button active={mode === "all"} onClick={() => { setMode("all"); setRoundStep(999); }}>全部連結</Button>
                      <Button active={mode === "strongOnly"} onClick={() => { setMode("strongOnly"); setRoundStep(999); }}>只看強連結</Button>
                      <Button active={mode === "weakPriority"} onClick={() => { setMode("weakPriority"); setRoundStep(999); }}>弱連結優先</Button>
                      <Button onClick={resetLayout}>重設節點位置</Button>
                      <Button danger={true} onClick={clearAllNetworkData} disabled={isBusy}>清空全部連結資料</Button>
                    </div>
                  </div>
                </div>

                <div className="px-6 pb-2">
                  <div className="rounded-2xl bg-slate-50 px-4 py-3 text-sm text-slate-600 leading-7">
                    這個版本的傳播模擬改成「按輪次擴散」：第 0 輪是起點本人，第 1 輪是直接連結，第 2 輪是朋友的朋友。
                    所以換不同起點時，覆蓋速度、平均距離、覆蓋 50%/80% 所需輪次，都會跟著改變。
                  </div>
                </div>

                <div className="p-6 pt-4">
                  <NetworkGraph
                    students={students}
                    positions={positions}
                    edges={edges.filter((e) => !(mode === "strongOnly" && e.type === "weak"))}
                    activeIds={activeIds}
                    selectedId={viewStudentId}
                    onSelect={setViewStudentId}
                    startId={startId}
                    betweennessRaw={betweennessMetrics.raw}
                    degreeRaw={degreeMetrics.degree}
                    onMoveNode={handleMoveNode}
                  />
                </div>
              </Card>

              <div className="grid gap-6">
                <Card>
                  <div className="p-6">
                    <div className="flex items-center justify-between gap-3">
                      <div className="text-xl font-semibold text-slate-900">班級名單設定</div>
                      <Button onClick={rebuildClass} disabled={isBusy}>重建班級名單</Button>
                    </div>

                    <div className="mt-4">
                      <div className="mb-2 text-sm text-slate-500">學生名單（每行一位）</div>
                      <textarea
                        value={rosterText}
                        onChange={(e) => setRosterText(e.target.value)}
                        rows="10"
                        className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800"
                      />
                    </div>

                    <div className="mt-3 text-sm text-slate-500">
                      重新建立名單時，會同步清除所有已送出的網絡連結資料。
                    </div>
                  </div>
                </Card>

                <Card>
                  <div className="p-6">
                    <div className="text-xl font-semibold text-slate-900">學生填答區</div>
                    <div className="mt-5 space-y-5">
                      <div>
                        <div className="mb-2 text-sm text-slate-500">1. 選自己的名字</div>
                        <select value={selectedStudentId} onChange={(e) => setSelectedStudentId(e.target.value)} className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800">
                          {students.map((student) => (
                            <option key={student.id} value={String(student.id)}>{student.label}</option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <div className="mb-2 text-sm text-slate-500">2. 指出最多 3 位強連結</div>
                        <div className="max-h-40 space-y-2 overflow-auto rounded-2xl border border-slate-200 p-3">
                          {students.filter((s) => String(s.id) !== selectedStudentId).map((student) => (
                            <label key={student.id} className="flex items-center gap-3 rounded-xl px-2 py-1 hover:bg-slate-50">
                              <input type="checkbox" checked={strongSelections.includes(String(student.id))} onChange={() => toggleStrong(String(student.id))} className="h-4 w-4" />
                              <span className="text-sm">{student.label}</span>
                            </label>
                          ))}
                        </div>
                      </div>

                      <div>
                        <div className="mb-2 text-sm text-slate-500">3. 指出最多 2 位弱連結</div>
                        <div className="max-h-40 space-y-2 overflow-auto rounded-2xl border border-slate-200 p-3">
                          {students.filter((s) => String(s.id) !== selectedStudentId && !strongSelections.includes(String(s.id))).map((student) => (
                            <label key={student.id} className="flex items-center gap-3 rounded-xl px-2 py-1 hover:bg-slate-50">
                              <input type="checkbox" checked={weakSelections.includes(String(student.id))} onChange={() => toggleWeak(String(student.id))} className="h-4 w-4" />
                              <span className="text-sm">{student.label}</span>
                            </label>
                          ))}
                        </div>
                      </div>

                      <Button className="w-full" active={true} onClick={submitOwnNetwork} disabled={isBusy}>送出目前選擇</Button>

                      {submitMessage && (
                        <div className="rounded-2xl bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
                          {submitMessage}
                        </div>
                      )}
                    </div>
                  </div>
                </Card>

                <Card>
                  <div className="p-6">
                    <div className="text-xl font-semibold text-slate-900">訊息傳播控制台</div>
                    <div className="mt-4 space-y-4">
                      <div>
                        <div className="mb-2 text-sm text-slate-500">起始同學</div>
                        <select
                          value={String(startId)}
                          onChange={(e) => {
                            setStartId(Number(e.target.value));
                            setRoundStep(999);
                          }}
                          className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800"
                        >
                          {students.map((student) => (
                            <option key={student.id} value={String(student.id)}>{student.label}</option>
                          ))}
                        </select>
                      </div>

                      <div className="grid grid-cols-3 gap-2">
                        <Button onClick={playPropagation} disabled={!edges.length}>開始</Button>
                        <Button onClick={advancePropagation} disabled={!edges.length}>下一輪</Button>
                        <Button onClick={resetPropagation}>全部顯示</Button>
                      </div>

                      <div className="rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">
                        <div className="font-medium text-slate-900">目前觀察</div>
                        <div className="mt-1">目前輪次：第 {currentVisibleRound} 輪</div>
                        <div className="mt-1">已收到訊息：{activeIds.size} / {students.length} 人</div>
                        <div className="mt-1">尚未收到：{students.length - activeIds.size} 人</div>
                        <div className="mt-1">填答進度：{completionCount} / {students.length} 人（{completionRate}%）</div>
                        <div className="mt-3"><ProgressBar value={completionRate} /></div>

                        <div className="mt-4 break-words">
                          本輪新增：{currentLayer.length ? currentLayer.map((id) => students.find((s) => s.id === id)?.label).filter(Boolean).join("、") : "尚無"}
                        </div>

                        <div className="mt-3 break-words">
                          目前累積覆蓋：{shownOrderLabels.length ? shownOrderLabels.slice(0, 12).join(" → ") + (shownOrderLabels.length > 12 ? " …" : "") : "尚未建立可傳播的網絡"}
                        </div>
                      </div>

                      <div className="rounded-2xl border border-slate-200 p-4">
                        <div className="font-medium text-slate-900">傳播效率指標</div>
                        <div className="mt-3 space-y-2 text-sm text-slate-600">
                          <div>可達人數：{propagationStats.reachableCount} / {students.length}</div>
                          <div>平均距離：{fmt(propagationStats.avgDistance, 2)}</div>
                          <div>最遠距離：{propagationStats.maxDistance ?? "—"} 輪</div>
                          <div>覆蓋 50% 所需輪次：{propagationStats.roundsTo50 ?? "無法覆蓋"} </div>
                          <div>覆蓋 80% 所需輪次：{propagationStats.roundsTo80 ?? "無法覆蓋"} </div>
                        </div>
                      </div>

                      <div className="rounded-2xl border border-slate-200 p-4">
                        <div className="font-medium text-slate-900">前幾輪擴散摘要</div>
                        <div className="mt-3 space-y-2 text-sm text-slate-600">
                          {roundSummaries.length === 0 ? (
                            <div>目前尚未形成可傳播的網絡。</div>
                          ) : (
                            roundSummaries.map((item) => (
                              <div key={item.round}>
                                第 {item.round} 輪：新增 {item.layerCount} 人，累積 {item.cumulativeCount} 人
                              </div>
                            ))
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </Card>

                <Card>
                  <div className="p-6">
                    <div className="text-xl font-semibold text-slate-900">正式指標解讀</div>
                    <div className="mt-4 space-y-4 text-sm leading-7 text-slate-600">
                      <div className="rounded-2xl border border-slate-200 p-4">
                        <div className="text-lg font-semibold text-slate-900">{selectedStudent.label || "尚未建立"}</div>
                        <div className="mt-2 flex flex-wrap gap-2">
                          <Badge>度數 {degreeMetrics.degree[selectedStudent.id] || 0}</Badge>
                          <Badge>度中心性 {fmt(degreeMetrics.normalized[selectedStudent.id])}</Badge>
                          <Badge dark={true}>中介中心性 {fmt(betweennessMetrics.raw[selectedStudent.id])}</Badge>
                          <Badge>標準化中介中心性 {fmt(betweennessMetrics.normalized[selectedStudent.id])}</Badge>
                        </div>
                        <div className="mt-3 text-slate-600">
                          度中心性反映這位同學直接連到多少人；中介中心性反映他在他人彼此最短路徑上充當中介的程度。
                        </div>
                      </div>

                      <div className="rounded-2xl bg-slate-50 p-4">
                        <div className="font-medium text-slate-900">度中心性前五名</div>
                        <div className="mt-2 space-y-2">
                          {topDegree.length === 0 ? (
                            <div className="text-slate-500">目前尚未形成足夠連結。</div>
                          ) : (
                            topDegree.map((student) => (
                              <div key={student.id} className="flex items-center justify-between gap-4">
                                <span>{student.label}</span>
                                <span className="text-slate-500">度數 {degreeMetrics.degree[student.id]}｜中心性 {fmt(degreeMetrics.normalized[student.id])}</span>
                              </div>
                            ))
                          )}
                        </div>
                      </div>

                      <div className="rounded-2xl bg-slate-50 p-4">
                        <div className="font-medium text-slate-900">中介中心性前五名</div>
                        <div className="mt-2 space-y-2">
                          {topBetweenness.length === 0 ? (
                            <div className="text-slate-500">目前尚未形成可計算的橋樑位置。</div>
                          ) : (
                            topBetweenness.map((student) => (
                              <div key={student.id} className="flex items-center justify-between gap-4">
                                <span>{student.label}</span>
                                <span className="text-slate-500">原始值 {fmt(betweennessMetrics.raw[student.id])}｜標準化 {fmt(betweennessMetrics.normalized[student.id])}</span>
                              </div>
                            ))
                          )}
                        </div>
                      </div>

                      <div className="rounded-2xl bg-slate-900 p-4 text-white">
                        <div className="font-medium">一句話帶走</div>
                        <div className="mt-1 text-white/80">
                          朋友多的人，不一定就是傳得最快的人；真正的傳播效率，還取決於他是否位在網絡中心、是否能快速接觸多層群體。
                        </div>
                      </div>
                    </div>
                  </div>
                </Card>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
