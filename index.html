  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const defaultRosterText = `詹O婷

    const strokeCollator = new Intl.Collator("zh-Hant-u-co-stroke");

    function parseRoster(text) {
      const rawRoster = text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      const duplicateCount = rawRoster.reduce((acc, name) => {
        acc[name] = (acc[name] || 0) + 1;
        return acc;
      }, {});
      const seenDuplicate = {};

      return [...rawRoster]
        .sort((a, b) => strokeCollator.compare(a, b))
        .map((name, index) => {
          if (duplicateCount[name] > 1) {
            seenDuplicate[name] = (seenDuplicate[name] || 0) + 1;
          }
          const suffix = duplicateCount[name] > 1 ? `（${String.fromCharCode(64 + seenDuplicate[name])}）` : "";
          return {
            id: index + 1,
            name,
            label: `${name}${suffix}`,
          };
        });
    }

    function buildPositions(students) {
      const polar = students.map((student, index) => {
        const total = students.length;
        const angle = (Math.PI * 2 * index) / total - Math.PI / 2;
        const ring = index < Math.ceil(total / 2) ? 34 : 22;
        const x = 50 + Math.cos(angle) * (ring + (index % 3) * 4);
        const y = 50 + Math.sin(angle) * (ring + (index % 3) * 4);
        return { id: student.id, x, y };
      });
      return Object.fromEntries(polar.map((p) => [p.id, p]));
    }

    function dedupeEdges(submissions) {
      const map = new Map();
      Object.entries(submissions).forEach(([sourceId, links]) => {
        links.strong.forEach((target) => {
          const a = Number(sourceId);
          const b = Number(target);
          const key = [Math.min(a, b), Math.max(a, b), "strong"].join("-");
          map.set(key, { source: a, target: b, type: "strong" });
        });
        links.weak.forEach((target) => {
          const a = Number(sourceId);
          const b = Number(target);
          const key = [Math.min(a, b), Math.max(a, b), "weak"].join("-");
          map.set(key, { source: a, target: b, type: "weak" });
        });
      });
      return Array.from(map.values());
    }

    function buildAdjacency(students, edges, mode) {
      const adjacency = {};
      students.forEach((s) => {
        adjacency[s.id] = [];
      });
      edges.forEach((edge) => {
        const weight = edge.type === "strong" ? 1 : mode === "weakPriority" ? 1 : 2;
        if (mode === "strongOnly" && edge.type === "weak") return;
        adjacency[edge.source].push({ id: edge.target, type: edge.type, weight });
        adjacency[edge.target].push({ id: edge.source, type: edge.type, weight });
      });
      return adjacency;
    }

    function bfs(startId, adjacency) {
      if (!startId || !adjacency[startId]) return { order: [], distance: {}, parent: {} };
      const visited = new Set([startId]);
      const distance = { [startId]: 0 };
      const parent = {};
      const order = [startId];
      const queue = [startId];

      while (queue.length) {
        const current = queue.shift();
        const neighbors = [...adjacency[current]].sort((a, b) => a.weight - b.weight);
        neighbors.forEach((next) => {
          if (!visited.has(next.id)) {
            visited.add(next.id);
            distance[next.id] = distance[current] + 1;
            parent[next.id] = current;
            order.push(next.id);
            queue.push(next.id);
          }
        });
      }

      return { order, distance, parent };
    }

    function computeBridgeScore(students, edges) {
      const counts = {};
      students.forEach((s) => {
        counts[s.id] = 0;
      });
      edges.forEach((edge) => {
        if (edge.type === "weak") {
          counts[edge.source] += 1;
          counts[edge.target] += 1;
        }
      });
      return counts;
    }

    function computePopularityScore(students, edges) {
      const counts = {};
      students.forEach((s) => {
        counts[s.id] = 0;
      });
      edges.forEach((edge) => {
        counts[edge.source] += 1;
        counts[edge.target] += 1;
      });
      return counts;
    }

    function Card({ children, className = "" }) {
      return <div className={`rounded-[28px] bg-white shadow-sm ring-1 ring-slate-200 ${className}`}>{children}</div>;
    }

    function Badge({ children, dark = false }) {
      return (
        <span className={`inline-flex items-center rounded-full px-3 py-1 text-sm ${dark ? "bg-slate-900 text-white" : "border border-slate-200 bg-white text-slate-700"}`}>
          {children}
        </span>
      );
    }

    function Button({ children, onClick, active = false, className = "", disabled = false }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`inline-flex items-center justify-center rounded-2xl px-4 py-2.5 text-sm font-medium transition ${active ? "bg-slate-900 text-white" : "border border-slate-200 bg-white text-slate-800 hover:bg-slate-50"} ${disabled ? "cursor-not-allowed opacity-50" : ""} ${className}`}
        >
          {children}
        </button>
      );
    }

    function ProgressBar({ value }) {
      return (
        <div className="h-2 w-full overflow-hidden rounded-full bg-slate-100">
          <div className="h-full rounded-full bg-slate-900" style={{ width: `${value}%` }}></div>
        </div>
      );
    }

    function NetworkGraph({ students, positions, edges, activeIds, selectedId, onSelect, startId, bridgeScores }) {
      return (
        <div className="relative h-[680px] w-full overflow-hidden rounded-[28px] border border-slate-200 bg-white">
          <svg className="absolute inset-0 h-full w-full">
            {edges.map((edge, idx) => {
              const p1 = positions[edge.source];
              const p2 = positions[edge.target];
              const active = activeIds.has(edge.source) && activeIds.has(edge.target);
              return (
                <line
                  key={idx}
                  x1={`${p1.x}%`}
                  y1={`${p1.y}%`}
                  x2={`${p2.x}%`}
                  y2={`${p2.y}%`}
                  stroke="currentColor"
                  className={edge.type === "strong" ? (active ? "text-slate-400" : "text-slate-200") : (active ? "text-emerald-400" : "text-emerald-200")}
                  strokeWidth={edge.type === "strong" ? 2.2 : 2.4}
                  strokeDasharray={edge.type === "weak" ? "6 5" : "0"}
                />
              );
            })}
          </svg>

          {students.map((student) => {
            const p = positions[student.id];
            const selected = selectedId === student.id;
            const active = activeIds.has(student.id);
            const isStart = startId === student.id;
            const bridge = (bridgeScores[student.id] || 0) >= 3;
            return (
              <button
                key={student.id}
                onClick={() => onSelect(student.id)}
                className={`absolute -translate-x-1/2 -translate-y-1/2 rounded-full border px-3 py-2 text-[11px] font-medium shadow-sm transition ${selected ? "border-slate-900 bg-slate-900 text-white" : active ? "border-emerald-500 bg-emerald-50 text-slate-900" : "border-slate-200 bg-white text-slate-700"}`}
                style={{ left: `${p.x}%`, top: `${p.y}%`, minWidth: 72 }}
              >
                <div className="truncate">{student.label}</div>
                <div className="mt-1 text-[10px] opacity-80">{isStart ? "起點" : bridge ? "橋樑位" : ""}</div>
              </button>
            );
          })}

          <div className="absolute bottom-4 left-4 rounded-2xl bg-white/95 px-4 py-3 shadow-sm ring-1 ring-slate-200">
            <div className="text-xs text-slate-500">圖例</div>
            <div className="mt-2 flex flex-wrap gap-3 text-xs text-slate-700">
              <span>— 強連結</span>
              <span className="text-emerald-600">- - 弱連結</span>
              <span>綠色節點＝已收到訊息</span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [rosterText, setRosterText] = useState(defaultRosterText);
      const [students, setStudents] = useState(() => parseRoster(defaultRosterText));
      const [selectedStudentId, setSelectedStudentId] = useState("1");
      const [strongSelections, setStrongSelections] = useState([]);
      const [weakSelections, setWeakSelections] = useState([]);
      const [submissions, setSubmissions] = useState({});
      const [viewStudentId, setViewStudentId] = useState(1);
      const [startId, setStartId] = useState(1);
      const [mode, setMode] = useState("all");
      const [step, setStep] = useState(999);

      const positions = useMemo(() => buildPositions(students), [students]);
      const edges = useMemo(() => dedupeEdges(submissions), [submissions]);
      const adjacency = useMemo(() => buildAdjacency(students, edges, mode), [students, edges, mode]);
      const traversal = useMemo(() => bfs(startId, adjacency), [startId, adjacency]);
      const bridgeScores = useMemo(() => computeBridgeScore(students, edges), [students, edges]);
      const popularityScores = useMemo(() => computePopularityScore(students, edges), [students, edges]);
      const shownOrder = step >= 999 ? traversal.order : traversal.order.slice(0, step);
      const activeIds = useMemo(() => new Set(shownOrder), [shownOrder]);
      const selectedStudent = students.find((s) => s.id === viewStudentId) || students[0] || { id: 1, label: "", name: "" };
      const selectedSubmission = submissions[selectedStudent.id] || { strong: [], weak: [] };
      const completionCount = Object.keys(submissions).length;
      const completionRate = students.length ? Math.round((completionCount / students.length) * 100) : 0;

      const topBridges = [...students]
        .filter((student) => (bridgeScores[student.id] || 0) > 0)
        .sort((a, b) => (bridgeScores[b.id] || 0) - (bridgeScores[a.id] || 0))
        .slice(0, 5);

      const topPopularity = [...students]
        .filter((student) => (popularityScores[student.id] || 0) > 0)
        .sort((a, b) => (popularityScores[b.id] || 0) - (popularityScores[a.id] || 0))
        .slice(0, 5);

      function rebuildClass() {
        const parsed = parseRoster(rosterText);
        if (!parsed.length) {
          alert("請先貼上至少一位學生姓名");
          return;
        }
        setStudents(parsed);
        setSubmissions({});
        setSelectedStudentId(String(parsed[0].id));
        setViewStudentId(parsed[0].id);
        setStartId(parsed[0].id);
        setStrongSelections([]);
        setWeakSelections([]);
        setStep(999);
      }

      function toggleStrong(id) {
        setStrongSelections((prev) => {
          if (prev.includes(id)) return prev.filter((item) => item !== id);
          if (prev.length >= 3) return [...prev.slice(1), id];
          return [...prev, id];
        });
      }

      function toggleWeak(id) {
        setWeakSelections((prev) => {
          if (prev.includes(id)) return prev.filter((item) => item !== id);
          if (prev.length >= 2) return [...prev.slice(1), id];
          return [...prev, id];
        });
      }

      function submitOwnNetwork() {
        const sourceId = Number(selectedStudentId);
        if (strongSelections.length !== 3 || weakSelections.length !== 2) {
          alert("請選滿 3 位強連結與 2 位弱連結");
          return;
        }
        setSubmissions((prev) => ({
          ...prev,
          [sourceId]: {
            strong: strongSelections.map(Number),
            weak: weakSelections.map(Number),
          },
        }));
        setViewStudentId(sourceId);
      }

      function resetPropagation() {
        setStep(999);
      }

      function playPropagation() {
        setStep(1);
      }

      function advancePropagation() {
        setStep((prev) => {
          if (prev >= traversal.order.length) return prev;
          return prev + 1;
        });
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900">
          <div className="mx-auto max-w-7xl px-6 py-8 lg:px-10">
            <div className="mb-8 grid gap-6 lg:grid-cols-[1.2fr_1fr]">
              <Card className="overflow-hidden">
                <div className="p-8">
                  <div className="flex flex-wrap items-center gap-3">
                    <Badge dark={true}>正式課堂版</Badge>
                    <Badge>先貼名單，再開始</Badge>
                    <Badge>3 個強連結 × 2 個弱連結</Badge>
                  </div>
                  <h1 className="mt-5 text-4xl font-semibold tracking-tight lg:text-5xl">班級社會網絡結構</h1>
                  <p className="mt-4 max-w-3xl text-base leading-7 text-slate-600 lg:text-lg">
                    先手動貼上學生名單並建立班級，再讓學生各自送出 3 位強連結與 2 位弱連結。系統會逐步長出班級網絡，並提供橋樑分數與人氣王指標，協助你觀察誰是跨圈層中介者、誰是最多連結的核心人物。
                  </p>

                  <div className="mt-6 grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
                    <Card><div className="p-6"><div className="text-sm text-slate-500">班級人數</div><div className="mt-2 text-3xl font-semibold">{students.length}</div><div className="mt-1 text-sm text-slate-500">姓名依筆劃排序顯示</div></div></Card>
                    <Card><div className="p-6"><div className="text-sm text-slate-500">已送出人數</div><div className="mt-2 text-3xl font-semibold">{completionCount}</div><div className="mt-1 text-sm text-slate-500">由學生實際填答生成</div></div></Card>
                    <Card><div className="p-6"><div className="text-sm text-slate-500">完成率</div><div className="mt-2 text-3xl font-semibold">{completionRate}%</div><div className="mt-3"><ProgressBar value={completionRate} /></div></div></Card>
                    <Card><div className="p-6"><div className="text-sm text-slate-500">目前起點</div><div className="mt-2 text-2xl font-semibold break-words">{students.find((s) => s.id === startId)?.label || "尚未建立"}</div><div className="mt-1 text-sm text-slate-500">可切換觀察不同同學</div></div></Card>
                  </div>
                </div>
              </Card>

              <Card>
                <div className="p-6">
                  <div className="text-xl font-semibold text-slate-900">班級初始化</div>
                  <div className="mt-4 space-y-4 text-sm leading-7 text-slate-600">
                    <div>先把學生名單一行一位貼到下面，再按「建立班級」。系統會依筆劃排序產生可選名單，並重置既有網絡資料。</div>
                    <textarea
                      value={rosterText}
                      onChange={(e) => setRosterText(e.target.value)}
                      className="h-56 w-full rounded-2xl border border-slate-200 bg-white p-4 text-sm text-slate-800"
                      placeholder="一行一位學生姓名"
                    />
                    <div className="flex gap-3">
                      <Button active={true} onClick={rebuildClass}>建立班級</Button>
                    </div>
                    <div className="rounded-2xl bg-amber-50 p-4 text-amber-900">
                      注意：若有同名學生，系統會自動標成 A、B、C 以利辨識。若能加入學號或座號，辨識會更穩。
                    </div>
                  </div>
                </div>
              </Card>
            </div>

            <div className="grid gap-6 xl:grid-cols-[1.45fr_0.95fr]">
              <Card>
                <div className="p-6">
                  <div className="flex flex-wrap items-center justify-between gap-3">
                    <div className="text-2xl font-semibold text-slate-900">班級網絡圖</div>
                    <div className="flex flex-wrap gap-2">
                      <Button active={mode === "all"} onClick={() => setMode("all")}>全部連結</Button>
                      <Button active={mode === "strongOnly"} onClick={() => setMode("strongOnly")}>只看強連結</Button>
                      <Button active={mode === "weakPriority"} onClick={() => setMode("weakPriority")}>弱連結優先</Button>
                    </div>
                  </div>
                </div>
                <div className="p-6 pt-0">
                  <NetworkGraph
                    students={students}
                    positions={positions}
                    edges={edges.filter((e) => !(mode === "strongOnly" && e.type === "weak"))}
                    activeIds={activeIds}
                    selectedId={viewStudentId}
                    onSelect={setViewStudentId}
                    startId={startId}
                    bridgeScores={bridgeScores}
                  />
                </div>
              </Card>

              <div className="grid gap-6">
                <Card>
                  <div className="p-6">
                    <div className="text-xl font-semibold text-slate-900">學生填答區</div>
                    <div className="mt-5 space-y-5">
                      <div>
                        <div className="mb-2 text-sm text-slate-500">1. 選自己的名字</div>
                        <select value={selectedStudentId} onChange={(e) => setSelectedStudentId(e.target.value)} className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800">
                          {students.map((student) => (
                            <option key={student.id} value={String(student.id)}>{student.label}</option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <div className="mb-2 text-sm text-slate-500">2. 指出 3 位強連結</div>
                        <div className="max-h-44 space-y-2 overflow-auto rounded-2xl border border-slate-200 p-3">
                          {students.filter((s) => String(s.id) !== selectedStudentId).map((student) => (
                            <label key={student.id} className="flex items-center gap-3 rounded-xl px-2 py-1 hover:bg-slate-50">
                              <input type="checkbox" checked={strongSelections.includes(String(student.id))} onChange={() => toggleStrong(String(student.id))} className="h-4 w-4" />
                              <span className="text-sm">{student.label}</span>
                            </label>
                          ))}
                        </div>
                      </div>

                      <div>
                        <div className="mb-2 text-sm text-slate-500">3. 指出 2 位弱連結</div>
                        <div className="max-h-44 space-y-2 overflow-auto rounded-2xl border border-slate-200 p-3">
                          {students.filter((s) => String(s.id) !== selectedStudentId && !strongSelections.includes(String(s.id))).map((student) => (
                            <label key={student.id} className="flex items-center gap-3 rounded-xl px-2 py-1 hover:bg-slate-50">
                              <input type="checkbox" checked={weakSelections.includes(String(student.id))} onChange={() => toggleWeak(String(student.id))} className="h-4 w-4" />
                              <span className="text-sm">{student.label}</span>
                            </label>
                          ))}
                        </div>
                      </div>

                      <Button className="w-full" active={true} onClick={submitOwnNetwork}>送出我的網絡</Button>
                    </div>
                  </div>
                </Card>

                <Card>
                  <div className="p-6">
                    <div className="text-xl font-semibold text-slate-900">訊息傳播控制台</div>
                    <div className="mt-4 space-y-4">
                      <div>
                        <div className="mb-2 text-sm text-slate-500">起始同學</div>
                        <select value={String(startId)} onChange={(e) => { setStartId(Number(e.target.value)); setStep(999); }} className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800">
                          {students.map((student) => (
                            <option key={student.id} value={String(student.id)}>{student.label}</option>
                          ))}
                        </select>
                      </div>
                      <div className="grid grid-cols-3 gap-2">
                        <Button onClick={playPropagation} disabled={!edges.length}>開始</Button>
                        <Button onClick={advancePropagation} disabled={!edges.length}>下一步</Button>
                        <Button onClick={resetPropagation}>全部顯示</Button>
                      </div>
                      <div className="rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">
                        <div className="font-medium text-slate-900">目前觀察</div>
                        <div className="mt-1">已收到訊息：{activeIds.size} / {students.length} 人</div>
                        <div className="mt-1">尚未收到：{students.length - activeIds.size} 人</div>
                        <div className="mt-1 break-words">傳播順序：{shownOrder.length === 0 ? "尚未建立可傳播的網絡" : `${shownOrder.slice(0, 8).map((id) => students.find((s) => s.id === id)?.label).join(" → ")}${shownOrder.length > 8 ? " …" : ""}`}</div>
                      </div>
                    </div>
                  </div>
                </Card>

                <Card>
                  <div className="p-6">
                    <div className="text-xl font-semibold text-slate-900">角色解讀</div>
                    <div className="mt-4 space-y-4 text-sm leading-7 text-slate-600">
                      <div className="rounded-2xl border border-slate-200 p-4">
                        <div className="text-lg font-semibold text-slate-900">{selectedStudent.label || "尚未建立"}</div>
                        <div className="mt-2 flex flex-wrap gap-2">
                          <Badge>強連結 {selectedSubmission.strong.length} 人</Badge>
                          <Badge>弱連結 {selectedSubmission.weak.length} 人</Badge>
                          <Badge dark={true}>橋樑分數 {bridgeScores[selectedStudent.id] || 0}</Badge>
                          <Badge>人氣王分數 {popularityScores[selectedStudent.id] || 0}</Badge>
                        </div>
                        <div className="mt-3 text-slate-600">
                          {(bridgeScores[selectedStudent.id] || 0) >= 3
                            ? "這位同學在多個弱連結中被指向，可能是跨圈層的重要橋樑。"
                            : (popularityScores[selectedStudent.id] || 0) >= 4
                              ? "這位同學的總連結數偏高，較可能是班上的高能見度核心人物。"
                              : "目前這位同學的網絡位置仍需要更多同學送出資料，才能更穩定判讀。"}
                        </div>
                      </div>

                      <div className="rounded-2xl bg-slate-50 p-4">
                        <div className="font-medium text-slate-900">最值得觀察的橋樑者</div>
                        <div className="mt-2 space-y-2">
                          {topBridges.length === 0 ? (
                            <div className="text-slate-500">目前尚未有人送出弱連結資料。</div>
                          ) : (
                            topBridges.map((student) => (
                              <div key={student.id} className="flex items-center justify-between gap-4"><span>{student.label}</span><span className="text-slate-500">橋樑分數 {bridgeScores[student.id] || 0}</span></div>
                            ))
                          )}
                        </div>
                      </div>

                      <div className="rounded-2xl bg-slate-50 p-4">
                        <div className="font-medium text-slate-900">人氣王排行榜</div>
                        <div className="mt-2 space-y-2">
                          {topPopularity.length === 0 ? (
                            <div className="text-slate-500">目前尚未形成足夠連結。</div>
                          ) : (
                            topPopularity.map((student) => (
                              <div key={student.id} className="flex items-center justify-between gap-4"><span>{student.label}</span><span className="text-slate-500">總連結數 {popularityScores[student.id] || 0}</span></div>
                            ))
                          )}
                        </div>
                      </div>

                      <div className="rounded-2xl bg-slate-900 p-4 text-white">
                        <div className="font-medium">一句話帶走</div>
                        <div className="mt-1 text-white/80">橋樑分數看的是誰把不同圈層接起來；人氣王指標看的是誰與最多人相連。兩者不一定是同一個人。</div>
                      </div>
                    </div>
                  </div>
                </Card>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
